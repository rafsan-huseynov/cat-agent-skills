name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & validate skills
    runs-on: ubuntu-latest
    # Allow the workflow to push extracted files back to PR branches from this
    # repo. Forks can't receive a write token, so we fall back to validate-only.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci

      # Same-repo PRs get a write token: extract submission zips into the site
      # (writes src/content/skills/*.md + public/bundles/*.zip) and commit the
      # result back to the PR branch. Hard-fails on missing/invalid metadata.
      # `authorGithub` is resolved purely from each submission's own metadata
      # (an explicit handle, or a github.com/<login> authorUrl) — never the
      # PR/merger login — so attribution is stable no matter who lands the skill.
      - name: Import skill submissions
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: npm run import:submissions

      - name: Commit extracted skills
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "$(git status --porcelain src/content/skills public/bundles)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/content/skills public/bundles
            git commit -m "chore: extract skill submissions"
            git push
          else
            echo "No extracted changes to commit."
          fi

      # Fork PRs can't receive a write token, so only validate the submissions
      # (still a hard fail on missing/invalid metadata). A maintainer can run
      # `npm run import:submissions` after merge, or the contributor can run it
      # locally and commit the generated files.
      - name: Validate skill submissions (fork PRs)
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: npm run check:submissions

      # `astro build` runs `astro check`-style content validation: every skill in
      # src/content/skills is parsed against the Zod schema (required platforms,
      # tags, etc.), so a malformed or out-of-policy skill fails the PR.
      - name: Build site (validates skill content)
        run: npm run build

  guard-scope:
    name: Guard PR scope (site vs submissions)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      # Fail a PR that edits BOTH a submission (submissions/**) and the site /
      # repo config (workflows, scripts, Astro app, root config, etc.) in one go.
      # Submission content and infra/site changes must be reviewed and merged
      # separately so a reviewer can't accidentally approve a site change while
      # signing off on a skill (or vice versa). Add the `allow-mixed-changes`
      # label to intentionally override. Generated artifacts that CI itself
      # commits back to the branch (src/content/skills, src/content/guides,
      # public/bundles, src/data/ratings.json) are ignored — they aren't
      # hand-authored site changes.
      - name: Detect mixed site + submission changes
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          if printf '%s' "$LABELS" | grep -q '"allow-mixed-changes"'; then
            echo "Label 'allow-mixed-changes' present — skipping scope guard."
            exit 0
          fi
          FILES="$(gh api --paginate "repos/$REPO/pulls/$PR/files" --jq '.[].filename')"
          echo "Changed files:"; printf '%s\n' "$FILES"
          SUBMISSION="$(printf '%s\n' "$FILES" | grep -E '^submissions/' || true)"
          SITE="$(printf '%s\n' "$FILES" \
            | grep -vE '^submissions/' \
            | grep -vE '^src/content/skills/' \
            | grep -vE '^src/content/guides/' \
            | grep -vE '^public/bundles/' \
            | grep -vE '^src/data/ratings\.json$' \
            || true)"
          if [ -n "$SUBMISSION" ] && [ -n "$SITE" ]; then
            {
              echo "### ❌ This PR mixes submission content with site/repo changes"
              echo ""
              echo "Split them into **separate PRs** — one for the submission, one"
              echo "for the site/config change — so each can be reviewed on its own."
              echo "(To override intentionally, add the \`allow-mixed-changes\` label.)"
              echo ""
              echo "**Submission files:**"
              printf '%s\n' "$SUBMISSION" | sed 's/^/- `/; s/$/`/'
              echo ""
              echo "**Site / repo files:**"
              printf '%s\n' "$SITE" | sed 's/^/- `/; s/$/`/'
            } | tee -a "$GITHUB_STEP_SUMMARY"
            echo "::error::PR mixes submission content with site/repo changes — split into separate PRs or add the 'allow-mixed-changes' label."
            exit 1
          fi
          echo "Scope guard passed: PR touches submissions or site, not both."
